<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Body -->
  <rect x="46" y="46" width="420" height="420" rx="96" ry="96" fill="#1a1410"/>
  <rect x="46" y="46" width="420" height="420" rx="96" ry="96" fill="none" stroke="#2a2018" stroke-width="4"/>

  <!-- Panel divider: higher up (~58% down), tighter/sharper step near center -->
  <path
    d="M 46 300
       L 250 300
       L 280 268
       L 466 268"
    fill="none"
    stroke="#c8960c"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.85"
  />

  <!-- Graduated accent dots: biggest near lens, shrinking outward -->
  <circle cx="330" cy="128" r="15" fill="#c8960c"/>
  <circle cx="372" cy="128" r="11" fill="#c8960c" opacity="0.8"/>
  <circle cx="406" cy="128" r="8" fill="#c8960c" opacity="0.65"/>

  <!-- Lens: light outer bezel ring -->
  <circle cx="192" cy="168" r="90" fill="#1a1410" stroke="#f2e6c8" stroke-width="6" opacity="0.9"/>

  <!-- Lens: gold ring -->
  <circle cx="192" cy="168" r="80" fill="#1a1410" stroke="#c8960c" stroke-width="14"/>

  <!-- Generic mana diamond inside lens -->
  <g stroke="#c8960c" stroke-width="4" fill="#c8960c" fill-opacity="0.85" stroke-linejoin="round">
    <polygon points="192,124 224,168 192,212 160,168" />
    <line x1="192" y1="124" x2="192" y2="212" stroke-opacity="0.5"/>
    <line x1="160" y1="168" x2="224" y2="168" stroke-opacity="0.5"/>
  </g>

  <!-- Play-button triangle, lower zone, roughly under the lens -->
  <polygon points="150,368 150,404 182,386" fill="#c8960c" opacity="0.85"/>

  <!-- Base line -->
  <line x1="230" y1="410" x2="380" y2="410" stroke="#c8960c" stroke-width="7" stroke-linecap="round" opacity="0.6"/>
</svg>
